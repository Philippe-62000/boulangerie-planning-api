
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestionnaire de Commandes Scolaires</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @media print {
            @page {
                size: A4;
                margin: 1cm;
            }
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .print-container {
                display: block !important;
                width: 100%;
                height: 100%;
            }
            .ticket-page {
                display: flex;
                flex-wrap: wrap;
                gap: 0.5cm 1cm;
                page-break-after: always;
            }
            .ticket {
                border: 1px solid black;
                padding: 0.5rem;
                width: calc(50% - 0.5cm); /* 2 columns with 1cm gap */
                height: calc(25% - 0.375cm); /* 4 rows with 0.5cm gap */
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                box-sizing: border-box;
                overflow: hidden;
            }
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel" data-presets="react,typescript">
        const { useState, useEffect, useCallback, useMemo } = React;

        // --- CONSTANTS ---
        const MONTHS = [
            'Aout', 'Septembre', 'Octobre', 'Novembre', 'Decembre', 'Janvier',
            'Fevrier', 'Mars', 'Avril', 'Mai', 'Juin', 'Juillet'
        ];
        const VIEW_MODES = { DAILY: 'daily', SUMMARY: 'summary' };
        const LOCAL_STORAGE_KEY = 'googleSheetIds';
        
        // --- HELPERS ---
        function parseCSV(csvText) {
            const lines = csvText.replace(/\r/g, '').split('\n');
            return lines.map(line => {
                const result = [];
                let current = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"' && (i === 0 || line[i - 1] !== '\\')) {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        result.push(current.trim().replace(/^"|"$/g, ''));
                        current = '';
                    } else {
                        current += char;
                    }
                }
                result.push(current.trim().replace(/^"|"$/g, ''));
                return result;
            });
        }
        
        function extractSheetIdFromUrl(url) {
            if (!url) return '';
            const match = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
            return match ? match[1] : '';
        }

        // --- DATA FETCHING ---
        const fetchAndParseSheet = async (sheetId, month) => {
            const sheetName = month;
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
            try {
                const response = await fetch(url);
                 if (!response.ok) {
                     throw new Error(`Erreur réseau (${response.status}) en accédant à la feuille ${sheetId}.`);
                }
                const csvText = await response.text();

                // Détection de la page de connexion Google, qui est en HTML.
                // Si la feuille n'est pas publique, Google renvoie cette page au lieu du CSV.
                if (csvText.trim().toLowerCase().startsWith('<!doctype html')) {
                    throw new Error(`Permission refusée pour la feuille ${sheetId}. Veuillez la partager publiquement.`);
                }

                if (!csvText.trim()) return [];

                const rows = parseCSV(csvText);
                if (rows.length < 2 || rows[0].length < 2) return [];

                const orders = [];
                const headerRow = rows[0];
                const className = headerRow[0] || 'Classe non définie';
                const dates = headerRow.slice(1);

                for (let i = 1; i < rows.length; i++) {
                    const studentRow = rows[i];
                    const studentName = studentRow[0];
                    if (!studentName || !studentName.trim()) continue;

                    const commands = studentRow.slice(1);
                    for (let j = 0; j < dates.length; j++) {
                        const command = commands[j];
                        const date = dates[j];

                        if (command && command.trim() && date && date.trim()) {
                            orders.push({
                                date: date.trim(),
                                time: 'N/A',
                                class: className.trim(),
                                name: studentName.trim(),
                                command: command.trim(),
                            });
                        }
                    }
                }
                return orders;
            } catch (error) {
                console.error(`Erreur lors de la récupération de la feuille ${sheetId} pour le mois ${month}:`, error);
                throw error; // Propage l'erreur pour qu'elle soit gérée dans l'interface
            }
        };

        const fetchOrdersForMonth = async (month, sheetIds) => {
            if (!sheetIds || sheetIds.length === 0) return [];
            // Promise.all se rejette si une seule promesse échoue, ce qui est parfait pour attraper une erreur de permission.
            const allSheetPromises = sheetIds.map(id => fetchAndParseSheet(id, month));
            const results = await Promise.all(allSheetPromises);
            const combinedOrders = results.flat();
            combinedOrders.sort((a, b) => {
                try {
                    const dateA = new Date(a.date.split('/').reverse().join('-')).getTime();
                    const dateB = new Date(b.date.split('/').reverse().join('-')).getTime();
                    return (isNaN(dateA) || isNaN(dateB)) ? 0 : dateA - dateB;
                } catch { return a.date.localeCompare(b.date); }
            });
            return combinedOrders;
        };

        // --- COMPONENTS ---
        const Spinner = () => (
            <div className="flex justify-center items-center p-8">
                <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
        );

        const SettingsModal = ({ initialUrls, onSave, onClose }) => {
            const [urls, setUrls] = useState([...initialUrls, ...Array(6 - initialUrls.length).fill('')]);

            const handleSave = () => {
                onSave(urls.filter(url => url.trim() !== ''));
                onClose();
            };

            const handleChange = (index, value) => {
                const newUrls = [...urls];
                newUrls[index] = value;
                setUrls(newUrls);
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50">
                    <div className="bg-white rounded-lg shadow-xl p-6 w-full max-w-2xl">
                        <h2 className="text-2xl font-bold mb-4">Configuration des Google Sheets</h2>
                        <p className="text-gray-600 mb-6">Veuillez coller les adresses complètes de vos 6 Google Sheets ci-dessous.</p>
                        <div className="space-y-4">
                            {urls.map((url, index) => (
                                <input
                                    key={index}
                                    type="text"
                                    placeholder={`Adresse de la Google Sheet ${index + 1}`}
                                    value={url}
                                    onChange={(e) => handleChange(index, e.target.value)}
                                    className="w-full p-2 border border-gray-300 rounded-md"
                                />
                            ))}
                        </div>
                        <div className="flex justify-end gap-4 mt-6">
                            <button onClick={onClose} className="px-4 py-2 bg-gray-200 text-gray-800 rounded-md hover:bg-gray-300">Annuler</button>
                            <button onClick={handleSave} className="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Sauvegarder</button>
                        </div>
                    </div>
                </div>
            );
        };

        const PrintView = ({ orders }) => {
            if (!orders || orders.length === 0) return null;

            const generationTime = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
            const date = orders[0].date;
            
            const chunkArray = (arr, size) => Array.from({ length: Math.ceil(arr.length / size) }, (v, i) => arr.slice(i * size, i * size + size));
            const pages = chunkArray(orders, 8);

            return (
                <div className="hidden print:block font-sans text-xs print-container">
                    {pages.map((pageOrders, pageIndex) => (
                        <div key={pageIndex} className="ticket-page">
                            {pageOrders.map((order, index) => (
                                <div key={index} className="ticket">
                                    <div>
                                        <div className="flex justify-between items-center border-b border-black pb-1 mb-1">
                                            <h4 className="font-bold text-sm">Ticket de Commande</h4>
                                            <p className="text-gray-700">{date}</p>
                                        </div>
                                        <div className="my-2">
                                            <p><span className="font-bold">Classe:</span> {order.class}</p>
                                            <p className="font-bold text-lg my-1 truncate">{order.name}</p>
                                        </div>
                                        <div className="border-t border-dashed border-gray-400 pt-2 mt-2">
                                            <p className="font-bold">Commande:</p>
                                            <p className="text-sm break-words">{order.command}</p>
                                        </div>
                                    </div>
                                    <div className="text-right text-gray-500 text-[10px] mt-2 pt-1 border-t border-gray-200">
                                        Généré à {generationTime}
                                    </div>
                                </div>
                            ))}
                        </div>
                    ))}
                </div>
            );
        };

        const MonthlySummary = ({ orders }) => {
            const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;
            const summaryData = useMemo(() => {
                const classCounts = orders.reduce((acc, order) => {
                    const className = order.class || 'Non spécifié';
                    acc[className] = (acc[className] || 0) + 1;
                    return acc;
                }, {});
                return Object.entries(classCounts)
                    .map(([name, total]) => ({ name, total }))
                    .sort((a, b) => b.total - a.total);
            }, [orders]);

            return (
                <div className="w-full h-[50vh] p-4">
                    <h3 className="text-xl font-bold text-slate-700 mb-4 text-center">Total des commandes par classe</h3>
                    <ResponsiveContainer width="100%" height="100%">
                        <BarChart data={summaryData} margin={{ top: 5, right: 30, left: 20, bottom: 5 }}>
                            <CartesianGrid strokeDasharray="3 3" />
                            <XAxis dataKey="name" />
                            <YAxis allowDecimals={false} />
                            <Tooltip />
                            <Legend />
                            <Bar dataKey="total" fill="#4f46e5" name="Total Commandes" />
                        </BarChart>
                    </ResponsiveContainer>
                </div>
            );
        };

        const DailyOrdersView = ({ orders, onPrint }) => {
            const ordersByDay = useMemo(() => orders.reduce((acc, order) => {
                (acc[order.date] = acc[order.date] || []).push(order);
                return acc;
            }, {}), [orders]);
            const sortedDays = useMemo(() => Object.keys(ordersByDay).sort((a, b) => {
                try {
                    const dateA = new Date(a.split('/').reverse().join('-')).getTime();
                    const dateB = new Date(b.split('/').reverse().join('-')).getTime();
                    return (isNaN(dateA) || isNaN(dateB)) ? 0 : dateA - dateB;
                } catch { return a.localeCompare(b); }
            }), [ordersByDay]);

            return (
                <div className="space-y-8">
                    {sortedDays.map(day => (
                        <div key={day} className="bg-slate-50 p-4 rounded-lg shadow-sm">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-xl font-bold text-slate-700">{day}</h3>
                                <button onClick={() => onPrint(ordersByDay[day])} className="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 transition-colors text-sm">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
                                    Imprimer les tickets du jour
                                </button>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="min-w-full divide-y divide-gray-200">
                                    <thead className="bg-gray-100">
                                        <tr>
                                            <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Classe</th>
                                            <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nom de l'élève</th>
                                            <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Commande</th>
                                        </tr>
                                    </thead>
                                    <tbody className="bg-white divide-y divide-gray-200">
                                        {ordersByDay[day].map((order, index) => (
                                            <tr key={index} className="hover:bg-gray-50">
                                                <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{order.class}</td>
                                                <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{order.name}</td>
                                                <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{order.command}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const MonthTabs = ({ currentMonthIndex, setCurrentMonthIndex }) => (
            <div className="border-b border-gray-200">
                <nav className="-mb-px flex space-x-4 overflow-x-auto" aria-label="Tabs">
                    {MONTHS.map((month, index) => (
                        <button key={month} onClick={() => setCurrentMonthIndex(index)}
                            className={`whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm transition-colors ${index === currentMonthIndex ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'}`}>
                            {month}
                        </button>
                    ))}
                </nav>
            </div>
        );

        // --- MAIN APP ---
        const App = () => {
            const getInitialMonthIndex = () => {
                const calendarMonths = ['Janvier', 'Fevrier', 'Mars', 'Avril', 'Mai', 'Juin', 'Juillet', 'Aout', 'Septembre', 'Octobre', 'Novembre', 'Decembre'];
                const currentMonthName = calendarMonths[new Date().getMonth()];
                const academicIndex = MONTHS.findIndex(m => m.toLowerCase() === currentMonthName.toLowerCase());
                return academicIndex > -1 ? academicIndex : 0;
            };
            
            const [currentMonthIndex, setCurrentMonthIndex] = useState(getInitialMonthIndex());
            const [sheetUrls, setSheetUrls] = useState([]);
            const [orders, setOrders] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [permissionError, setPermissionError] = useState(false);
            const [viewMode, setViewMode] = useState(VIEW_MODES.DAILY);
            const [ordersToPrint, setOrdersToPrint] = useState(null);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);

            const sheetIds = useMemo(() => sheetUrls.map(extractSheetIdFromUrl).filter(Boolean), [sheetUrls]);
            const selectedMonthName = useMemo(() => MONTHS[currentMonthIndex], [currentMonthIndex]);

            useEffect(() => {
                try {
                    const savedUrls = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY));
                    if (savedUrls && Array.isArray(savedUrls) && savedUrls.length > 0) {
                        setSheetUrls(savedUrls);
                    } else {
                        setIsSettingsOpen(true);
                    }
                } catch (e) {
                    console.error("Failed to load settings from localStorage", e);
                }
            }, []);

            const loadOrders = useCallback(async (month, ids) => {
                if (ids.length === 0) {
                    setLoading(false);
                    setOrders([]);
                    return;
                }
                setLoading(true);
                setError(null);
                setPermissionError(false);
                try {
                    setOrders(await fetchOrdersForMonth(month, ids));
                } catch (err) {
                    if (err.message.includes('Permission refusée')) {
                        setPermissionError(true);
                    } else {
                        setError(err instanceof Error ? err.message : 'Une erreur inconnue est survenue.');
                    }
                    setOrders([]);
                } finally {
                    setLoading(false);
                }
            }, []);

            useEffect(() => {
                loadOrders(selectedMonthName, sheetIds);
            }, [selectedMonthName, sheetIds, loadOrders]);

            const handleSaveSettings = (urls) => {
                setSheetUrls(urls);
                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(urls));
            };

            const handlePrint = (dailyOrders) => {
                setOrdersToPrint(dailyOrders);
                setTimeout(() => {
                    window.print();
                    setOrdersToPrint(null);
                }, 100);
            };
            
            const renderContent = () => {
                if (loading) return <Spinner />;

                if (permissionError) {
                    return (
                        <div className="text-center text-orange-800 bg-orange-100 border-l-4 border-orange-500 p-6 rounded-md" role="alert">
                            <h3 className="text-xl font-bold mb-3">Action requise : Problème de permission</h3>
                            <p className="text-left mb-4">L'application ne peut pas accéder aux données car un ou plusieurs de vos fichiers Google Sheets ne sont pas partagés publiquement. Veuillez suivre ces étapes pour <strong>chaque feuille de calcul</strong> :</p>
                            <ol className="list-decimal list-inside text-left space-y-3">
                                <li>Ouvrez votre fichier Google Sheet.</li>
                                <li>Cliquez sur le bouton bleu <strong>"Partager"</strong> en haut à droite.</li>
                                <li>Dans la fenêtre qui s'ouvre, cherchez la section "Accès général".</li>
                                <li>Si elle indique "Restreint", cliquez dessus et sélectionnez <strong>"Tous les utilisateurs disposant du lien"</strong>.</li>
                                <li>Assurez-vous que le rôle à droite est bien "<strong>Lecteur</strong>".</li>
                                <li>Cliquez sur "OK", puis revenez ici et <strong>rechargez la page</strong> (touche F5 ou Ctrl+R).</li>
                            </ol>
                        </div>
                    );
                }

                if (error) return <div className="text-center text-red-500 bg-red-100 p-4 rounded-md">{error}</div>;

                if (sheetIds.length === 0) {
                    return (
                        <div className="text-center text-gray-500 mt-8">
                            <h3 className="text-xl font-semibold mb-2">Bienvenue !</h3>
                            <p>Veuillez configurer les adresses de vos Google Sheets en cliquant sur l'icône ⚙️ en haut à droite.</p>
                        </div>
                    );
                }
                
                if (orders.length === 0) {
                     return (
                        <div className="text-center text-gray-500 mt-8">
                            <h3 className="text-xl font-semibold mb-2">Aucune commande trouvée</h3>
                            <p>Vérifiez que les adresses des Google Sheets sont correctes et que l'onglet pour "{selectedMonthName}" existe et contient des données.</p>
                            <p className="mt-2 text-sm">Si le problème persiste, assurez-vous que les feuilles sont partagées publiquement ("Tous les utilisateurs disposant du lien").</p>
                        </div>
                    );
                }

                return viewMode === VIEW_MODES.DAILY
                    ? <DailyOrdersView orders={orders} onPrint={handlePrint} />
                    : <MonthlySummary orders={orders} />;
            };

            return (
                <React.Fragment>
                    <div className="min-h-screen bg-slate-50 text-slate-800 print:hidden">
                        <header className="bg-white shadow-md">
                            <div className="container mx-auto px-4 py-6 flex justify-between items-center">
                                <div>
                                    <h1 className="text-3xl font-bold text-slate-900">Gestionnaire de Commandes</h1>
                                    <p className="text-slate-600 mt-1">Consultez et imprimez les commandes journalières.</p>
                                </div>
                                <button onClick={() => setIsSettingsOpen(true)} className="p-2 rounded-full hover:bg-gray-200" title="Configuration">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                                </button>
                            </div>
                        </header>
                        <main className="container mx-auto p-4">
                            <MonthTabs currentMonthIndex={currentMonthIndex} setCurrentMonthIndex={setCurrentMonthIndex} />
                            <div className="bg-white p-6 rounded-lg shadow-lg mt-4 min-h-[60vh]">
                                <div className="flex justify-between items-center mb-4 border-b pb-4">
                                    <h2 className="text-2xl font-semibold">{selectedMonthName}</h2>
                                    <div className="flex items-center gap-2">
                                        <button onClick={() => setViewMode(VIEW_MODES.DAILY)} className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${viewMode === VIEW_MODES.DAILY ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`}>Vue Journalière</button>
                                        <button onClick={() => setViewMode(VIEW_MODES.SUMMARY)} className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${viewMode === VIEW_MODES.SUMMARY ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`}>Récapitulatif</button>
                                    </div>
                                </div>
                                {renderContent()}
                            </div>
                        </main>
                        <footer className="text-center py-4 text-slate-500 text-sm">
                            <p>Généré le {new Date().toLocaleString('fr-FR')}</p>
                        </footer>
                    </div>
                    {isSettingsOpen && <SettingsModal initialUrls={sheetUrls} onSave={handleSaveSettings} onClose={() => setIsSettingsOpen(false)} />}
                    {ordersToPrint && <PrintView orders={ordersToPrint} />}
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
